name: Publish JSR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # The OIDC ID token is used for authentication with JSR.
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish @zarrita/storage
        run: deno publish --unstable-sloppy-imports
        working-directory: packages/@zarrita-storage

      # --no-check: Deno v2 (TS 5.9) changes ArrayBufferView to use ArrayBufferLike,
      # which breaks `new Response(data)` in util.ts. Also hits a Deno bug in
      # slow-type validation of overloaded `create` function.
      # Remove --no-check when TS is upgraded to 5.9+ in the project.
      - name: Publish @zarrita/zarrita
        run: deno publish --unstable-sloppy-imports --no-check --allow-slow-types
        working-directory: packages/zarrita

      # --no-check: Deno v2 (TS 5.9) adds Float16Array to the default lib, which
      # causes zarrita's TypedArray<D> union to include it. @types/ndarray doesn't
      # accept Float16Array yet, so type checking fails. Remove when @types/ndarray
      # is updated (https://github.com/DefinitelyTyped/DefinitelyTyped).
      - name: Publish @zarrita/ndarray
        run: deno publish --unstable-sloppy-imports --no-check
        working-directory: packages/@zarrita-ndarray
